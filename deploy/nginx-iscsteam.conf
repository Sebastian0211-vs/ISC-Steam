# nginx site for ISC Steam — proxies the domain to the Docker app on localhost.
# Install:
#   sudo cp deploy/nginx-iscsteam.conf /etc/nginx/sites-available/iscsteam
#   sudo nano /etc/nginx/sites-available/iscsteam    # set your domain
#   sudo ln -s /etc/nginx/sites-available/iscsteam /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d iscsteam.example.com     # adds HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name iscsteam.example.com;

    # game package uploads from the dashboard can be large
    client_max_body_size 250m;

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # game packages can be large; don't buffer uploads/downloads to disk
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # socket.io (friends / chat / presence) needs WebSocket upgrades
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }
}
